<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lab 705 · 文章管理</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=JetBrains+Mono:wght@400;600&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./admin-console.css" />
</head>
<body>
  <div class="circuit-overlay" aria-hidden="true"></div>
  <div class="noise-overlay" aria-hidden="true"></div>

  <main class="page">
    <section id="app">
      <section class="hero-shell">
        <nav class="bus-nav" aria-label="管理导航">
          <a class="bus-item" href="./index.html"><span>00</span> 首页</a>
          <a class="bus-item" href="./lab-705.html"><span>01</span> 管理入口</a>
          <a class="bus-item" href="./article-admin.html"><span>02</span> 文章管理</a>
          <a class="bus-item" href="./page-admin.html"><span>03</span> 页面管理</a>
          <a class="bus-item" href="./guestbook-admin.html"><span>04</span> 留言管理</a>
        </nav>
        <div class="hero-core">
          <p class="chip-mark">ARTICLE.MANAGER.CONSOLE</p>
          <h1>文章发布与修改</h1>
          <p class="lead">只处理文章：新建、编辑、上下线、删除，并单独发布 <code>articles.json</code>。</p>
        </div>
      </section>

      <section class="panel">
        <div class="panel-head">
          <h2 id="formTitle">新建文章</h2>
          <p class="tip">标题/正文/日期是必填。</p>
        </div>
        <form id="articleForm" class="form-grid">
          <input type="hidden" id="articleId" />

          <label for="title">标题</label>
          <input id="title" required maxlength="100" />

          <label for="summary">摘要</label>
          <textarea id="summary" rows="2" maxlength="240"></textarea>

          <label for="content">正文</label>
          <textarea id="content" rows="8" required></textarea>

          <label for="cover">封面图 URL</label>
          <input id="cover" placeholder="https://..." />

          <label for="tags">标签（英文逗号分隔）</label>
          <input id="tags" placeholder="C语言, STM32" />

          <label for="date">日期</label>
          <input id="date" type="date" required />

          <label for="status">状态</label>
          <select id="status">
            <option value="draft">草稿</option>
            <option value="published">发布</option>
          </select>

          <div class="form-actions">
            <button type="submit" id="saveBtn" class="btn btn-primary">保存到当前会话</button>
            <button type="button" id="resetBtn" class="btn btn-ghost">清空</button>
          </div>
          <p id="formStatus" class="tip"></p>
        </form>
      </section>

      <section class="panel">
        <div class="panel-head">
          <h2>发布到 GitHub</h2>
          <p class="tip">仅更新 <code>articles.json</code></p>
        </div>
        <div class="form-grid">
          <label for="owner">GitHub 用户名</label>
          <input id="owner" value="EneriCdl" />

          <label for="repo">仓库名</label>
          <input id="repo" value="EneriCdl.github.io" />

          <label for="branch">分支</label>
          <input id="branch" value="main" />

          <label for="token">GitHub Token（需要 Contents: Read and write）</label>
          <input id="token" type="password" placeholder="ghp_xxx" />
          <label class="inline-check">
            <input id="rememberToken" type="checkbox" checked />
            <span>记住 Token（当前浏览器）</span>
          </label>

          <div class="form-actions">
            <button type="button" id="publishBtn" class="btn btn-primary">发布 articles.json</button>
            <button type="button" id="downloadBtn" class="btn btn-ghost">下载 articles.json</button>
            <button type="button" id="reloadBtn" class="btn btn-ghost">重新载入线上文章</button>
            <button type="button" id="clearTokenBtn" class="btn btn-ghost">清除已记住 Token</button>
          </div>
          <p id="publishStatus" class="tip"></p>
        </div>
      </section>

      <section class="panel">
        <h2>文章列表</h2>
        <div id="manageList" class="manage-list"></div>
      </section>
    </section>
  </main>

  <script src="./admin-common.js"></script>
  <script src="./article-admin.js"></script>
</body>
</html>

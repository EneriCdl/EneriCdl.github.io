<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lab 705 · 页面管理</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=JetBrains+Mono:wght@400;600&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./admin-console.css" />
</head>
<body>
  <div class="circuit-overlay" aria-hidden="true"></div>
  <div class="noise-overlay" aria-hidden="true"></div>

  <main class="page">
    <section id="app">
      <section class="hero-shell">
        <nav class="bus-nav" aria-label="管理导航">
          <a class="bus-item" href="./index.html"><span>00</span> 首页</a>
          <a class="bus-item" href="./lab-705.html"><span>01</span> 管理入口</a>
          <a class="bus-item" href="./article-admin.html"><span>02</span> 文章管理</a>
          <a class="bus-item" href="./page-admin.html"><span>03</span> 页面管理</a>
          <a class="bus-item" href="./guestbook-admin.html?v=20260324b"><span>04</span> 留言管理</a>
        </nav>
        <div class="hero-core">
          <p class="chip-mark">PAGE.CONFIG.CONSOLE</p>
          <h1>首页文案配置</h1>
          <p class="lead">只处理首页展示文案，并单独发布 <code>site-config.json</code>。</p>
        </div>
      </section>

      <section class="panel">
        <h2>页面内容配置</h2>
        <p class="tip">你只改需要改的项，留空会自动保持原值不变。</p>
        <div class="form-grid">
          <label for="projectTitle1">作品卡片 1 标题</label>
          <input id="projectTitle1" />
          <label for="projectDesc1">作品卡片 1 描述</label>
          <textarea id="projectDesc1" rows="2"></textarea>

          <label for="projectTitle2">作品卡片 2 标题</label>
          <input id="projectTitle2" />
          <label for="projectDesc2">作品卡片 2 描述</label>
          <textarea id="projectDesc2" rows="2"></textarea>

          <label for="projectTitle3">作品卡片 3 标题</label>
          <input id="projectTitle3" />
          <label for="projectDesc3">作品卡片 3 描述</label>
          <textarea id="projectDesc3" rows="2"></textarea>

          <label for="aboutTitle">关于我标题</label>
          <input id="aboutTitle" />
          <label for="aboutText1">关于我段落 1</label>
          <textarea id="aboutText1" rows="2"></textarea>
          <label for="aboutText2">关于我段落 2</label>
          <textarea id="aboutText2" rows="2"></textarea>

          <label for="timelineTitle">学习总线标题</label>
          <input id="timelineTitle" />
          <label for="timelineItem1">学习总线 1（格式：BUS-1|内容）</label>
          <input id="timelineItem1" />
          <label for="timelineItem2">学习总线 2（格式：BUS-2|内容）</label>
          <input id="timelineItem2" />
          <label for="timelineItem3">学习总线 3（格式：BUS-3|内容）</label>
          <input id="timelineItem3" />

          <div class="form-actions">
            <button type="button" id="refreshPreviewBtn" class="btn btn-ghost">刷新预览</button>
            <button type="button" id="reloadConfigBtn" class="btn btn-ghost">重新载入线上配置</button>
          </div>
        </div>
      </section>

      <section class="panel">
        <h2>实时预览（未发布）</h2>
        <div class="preview-grid">
          <article class="preview-card">
            <h3 id="pvProjectTitle1">-</h3>
            <p id="pvProjectDesc1">-</p>
          </article>
          <article class="preview-card">
            <h3 id="pvProjectTitle2">-</h3>
            <p id="pvProjectDesc2">-</p>
          </article>
          <article class="preview-card">
            <h3 id="pvProjectTitle3">-</h3>
            <p id="pvProjectDesc3">-</p>
          </article>
        </div>
        <article class="preview-panel">
          <h3 id="pvAboutTitle">-</h3>
          <p id="pvAboutText1">-</p>
          <p id="pvAboutText2">-</p>
        </article>
        <article class="preview-panel">
          <h3 id="pvTimelineTitle">-</h3>
          <ul class="preview-list">
            <li id="pvTimelineItem1">-</li>
            <li id="pvTimelineItem2">-</li>
            <li id="pvTimelineItem3">-</li>
          </ul>
        </article>
      </section>

      <section class="panel">
        <h2>发布到 GitHub</h2>
        <p class="tip">仅更新 <code>site-config.json</code></p>
        <div class="form-grid">
          <label for="owner">GitHub 用户名</label>
          <input id="owner" value="EneriCdl" />

          <label for="repo">仓库名</label>
          <input id="repo" value="EneriCdl.github.io" />

          <label for="branch">分支</label>
          <input id="branch" value="main" />

          <label for="token">GitHub Token（需要 Contents: Read and write）</label>
          <input id="token" type="password" placeholder="ghp_xxx" />
          <label class="inline-check">
            <input id="rememberToken" type="checkbox" checked />
            <span>记住 Token（当前浏览器）</span>
          </label>

          <div class="form-actions">
            <button type="button" id="publishBtn" class="btn btn-primary">发布 site-config.json</button>
            <button type="button" id="downloadConfigBtn" class="btn btn-ghost">下载 site-config.json</button>
            <button type="button" id="clearTokenBtn" class="btn btn-ghost">清除已记住 Token</button>
          </div>
          <p id="publishStatus" class="tip"></p>
        </div>
      </section>
    </section>
  </main>

  <script src="./admin-common.js"></script>
  <script src="./page-admin.js"></script>
</body>
</html>

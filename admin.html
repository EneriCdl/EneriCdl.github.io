<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>文章管理 · EneriCdl</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./admin.css" />
</head>
<body>
  <main class="admin-page">
    <header class="head">
      <h1>文章创建与管理</h1>
      <a href="./index.html">返回首页</a>
    </header>

    <section class="panel">
      <h2 id="formTitle">新建文章</h2>
      <form id="articleForm" class="form">
        <input type="hidden" id="articleId" />

        <label for="title">标题</label>
        <input id="title" name="title" required maxlength="80" />

        <label for="summary">摘要</label>
        <textarea id="summary" name="summary" rows="2" maxlength="200"></textarea>

        <label for="content">正文</label>
        <textarea id="content" name="content" rows="8" required></textarea>

        <label for="tags">标签（英文逗号分隔）</label>
        <input id="tags" name="tags" placeholder="C语言, STM32, 学习记录" />

        <label for="date">日期</label>
        <input id="date" name="date" type="date" required />

        <label for="status">状态</label>
        <select id="status" name="status">
          <option value="draft">草稿</option>
          <option value="published">发布</option>
        </select>

        <div class="form-actions">
          <button type="submit" class="btn primary">保存到草稿区</button>
          <button type="button" id="resetBtn" class="btn ghost">清空表单</button>
        </div>
      </form>
    </section>

    <section class="panel">
      <h2>发布设置</h2>
      <p class="tip">点击“发布到 GitHub”后会更新仓库中的 <code>articles.json</code>，所有人都能在你的网站看到最新文章。</p>
      <div class="form">
        <label for="owner">GitHub 用户名</label>
        <input id="owner" value="EneriCdl" />

        <label for="repo">仓库名</label>
        <input id="repo" value="EneriCdl.github.io" />

        <label for="branch">分支</label>
        <input id="branch" value="main" />

        <label for="path">文章文件路径</label>
        <input id="path" value="articles.json" />

        <label for="token">GitHub Token（不会落盘保存）</label>
        <input id="token" type="password" placeholder="粘贴具有 Contents 写入权限的 Token" />

        <div class="form-actions">
          <button type="button" id="publishBtn" class="btn primary">发布到 GitHub</button>
          <button type="button" id="downloadBtn" class="btn ghost">下载 JSON 备份</button>
        </div>
        <p id="publishStatus" class="tip"></p>
      </div>
    </section>

    <section class="panel">
      <h2>文章列表</h2>
      <div id="manageList" class="manage-list"></div>
    </section>
  </main>

  <script src="./admin.js"></script>
</body>
</html>
